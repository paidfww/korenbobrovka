<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЖИ Чат-бот</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>🤖 ЖИ Чат-бот (API тест)</h2>

        <!-- API кілтін енгізу өрісі -->
        <div class="api-section">
            <label for="apiKey">🔑 API кілтіңіз:</label>
            <input type="password" id="apiKey" placeholder="OpenAI / Claude API кілті" />
        </div>

        <!-- Чат терезесі -->
        <div class="chat-box" id="chatBox">
            <div class="message bot">🤖 Сәлем! Сұрағыңызды жазыңыз.</div>
        </div>

        <!-- Енгізу өрісі мен батырма -->
        <div class="input-group">
            <input type="text" id="userInput" placeholder="Сұрағыңызды жазыңыз..." />
            <button id="sendBtn">Жіберу</button>
        </div>

        <!-- Санауыш -->
        <p class="counter">Жіберілген сұраныстар: <span id="requestCount">0</span></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
